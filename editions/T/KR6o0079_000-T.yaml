front:
  text: 新譯大乘起信論序夫聲同則應道合自隣是以法雄命宗賴宣揚乎法子素王垂範假傳述乎素臣蓋德必不孤聖無虛應矣起信論者大乘之祕典也佛滅度後五百餘年有馬鳴菩薩出興于世時稱四日道王五天轉不退輪建無生忍銘總持之智印宅畢竟之真空受波奢付囑蒙釋尊遠記善說法要大啟迷津欲使群生殖不壞之信根下難思之佛種故造斯論其為論也示無價寶詮最上乘演恒沙之法門惟在方寸開諸佛之祕藏本自一心遣執而不喪其真存修而亦忘其相少文而攝多義假名而會深旨落落焉晈智月於淨天滔滔焉注禪河於性海返迷歸極莫不由之此論東傳總經二譯初本即西印度三藏法師波羅末陀此云真諦以梁武帝承聖三年歲次癸酉九月十日於衡州始興郡建興寺共揚州沙門智愷所譯此本即于闐國三藏法師實叉難陀齎梵文至此又於西京慈恩塔內獲舊梵本與義學沙門荊州弘景崇福法藏等以大周聖曆三年歲次癸亥十月壬午朔八日己丑於授記寺與花嚴經相次而譯沙門復禮筆受開為兩卷然與舊翻時有出沒蓋譯者之意又梵文非一也夫理幽則信難道尊則魔盛況當劫濁尤更倍增故使偏見之流執成唯識誹毀此論真妄互熏既形於言遂彰時聽方等甘露翻為毒藥故經云唯佛與佛乃能究盡諸法實相豈可輒以凡心貶量聖旨夫真如者物之性也備難思之業用蘊不空之勝德內熏妄法令起厭求故勝鬘經云由有如來藏令厭生死苦樂求涅槃又經云闡提之人未來以佛性力故善根還生如彼淨珠能清濁水是勝義之常善異太虛之無記故經云佛性常故非三世攝虛空無故非三世攝豈執事空以齊真理夫論妄者依理故迷真性隨流為妄漂動故經云隨其流處有種種味又楞伽經云如來藏為無始虛偽惡習所熏名為識藏密嚴經云佛說如來藏以為阿賴耶惡慧不能知藏即賴耶識雖在纏而體淨不變性而成迷故經云然藥真味停留在山猶如滿月又云雖處五道受別異身而此佛性常恒不變若言真不熏妄妄不熏真真妄兩殊豈會中道故梁攝論云智障極盲暗謂真俗別執今則真為妄體妄假真成性相俱融一異雙遣故密嚴經云如來清淨藏世間阿賴耶如金與指環展轉無差別聖教明白何所致疑良由滯相而乖真尋末而棄本言越規矩動成戲論自貽聖責深可悲哉余少小以來專心斯論翫味不已諷誦忘疲課拙傳揚二十餘遍雖未究深旨而麁識文意以為大乘明鏡莫過於此幸希宗心之士時覽斯文庶日進有功聊為序引云爾
